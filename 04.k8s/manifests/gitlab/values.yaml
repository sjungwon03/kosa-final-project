global:
  edition: ce
  hosts:
    domain: mgmt.local
    https: false
  storageClass: rbd-storage
  nodeSelector:
    kubernetes.io/hostname: k8s-worker-plat
  ingress:
    configureCertmanager: false
  initialRootPassword:
    secret: gitlab-initial-root-password
    key: password

gitlab:
  gitaly:
    persistence:
      storageClass: rbd-storage
  webservice:
    replicaCount: 1
    minReplicas: 1
    maxReplicas: 1
    resources:
      requests:
        cpu: 200m
        memory: 1200Mi
    service:
      type: LoadBalancer
      annotations:
        metallb.universe.tf/allow-shared-ip: gitlab-shared
  sidekiq:
    replicaCount: 1
    minReplicas: 1
    maxReplicas: 1
    resources:
      requests:
        cpu: 300m
        memory: 1200Mi
  gitlab-shell:
    replicaCount: 1
    service:
      type: LoadBalancer
      annotations:
        metallb.universe.tf/allow-shared-ip: gitlab-shared
  kas:
    enabled: false
  initialRootPassword:
    secret: gitlab-initial-root-password
    key: password

nginx-ingress:
  enabled: false

certmanager:
  install: false
  installCRDs: false
  createIssuers: false

certmanager-issuer:
  enabled: false
  email: admin@mgmt.local

prometheus:
  install: false
  server:
    persistentVolume:
      storageClass: rbd-storage

gitlab-runner:
  install: false

registry:
  enabled: false

postgresql:
  primary:
    persistence:
      storageClass: rbd-storage

redis:
  master:
    persistence:
      storageClass: rbd-storage

minio:
  persistence:
    storageClass: rbd-storage
