apiVersion: v1
kind: Namespace
metadata:
  name: metallb-system
  labels:
    name: metallb-system
---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: platform-ip-pool
  namespace: metallb-system
spec:
  addresses:
  - 172.16.30.200-172.16.30.210
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: platform-l2-advertisement
  namespace: metallb-system
spec:
  ipAddressPools:
  - platform-ip-pool