gitea:
  admin:
    username: gitea_admin
    password: "kosa1004"
    email: admin@mgmt.local

  ingress:
    enabled: false

  service:
    http:
      type: LoadBalancer
      annotations:
        metallb.universe.tf/allow-shared-ip: gitea-shared

  persistence:
    enabled: true
    storageClass: rbd-storage
    size: 20Gi

  nodeSelector:
    kubernetes.io/hostname: k8s-worker-plat

postgresql:
  enabled: true
  primary:
    persistence:
      enabled: true
      storageClass: rbd-storage

postgresql-ha:
  enabled: false
  postgresql:
    image:
      repository: bitnamilegacy/postgresql-repmgr
      tag: 17.5.0-debian-12-r10
  pgpool:
    image:
      repository: bitnamilegacy/pgpool
      tag: 4.6.1-debian-12-r0

redis-cluster:
  enabled: false

redis:
  enabled: true
  master:
    persistence:
      enabled: true
      storageClass: rbd-storage

# Gitea chart v12 계열은 기본적으로 valkey-cluster 서브차트를 사용합니다.
# Bitnami public 이미지 축소 이슈로 인해 legacy 레포로 고정합니다.
valkey-cluster:
  image:
    repository: bitnamilegacy/valkey-cluster
    tag: 8.1.3-debian-12-r3
