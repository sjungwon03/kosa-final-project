---
# roles/docker_base/tasks/main.yml

- name: 필수 패키지 설치
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - python3-pip
    state: present
    update_cache: yes

# TODO(폐쇄망): GPG 키 및 저장소 URL을 Nexus raw 저장소로 전환
- name: Docker GPG 키 추가
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Docker 저장소 등록
  apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

# TODO(폐쇄망): Nexus apt 프록시 저장소로 전환
- name: Docker 엔진 및 컴포즈 설치
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: Docker 서비스 활성화
  service:
    name: docker
    state: started
    enabled: yes

- name: Docker SDK for Python 설치 (Ansible 모듈용 - APT 사용)
  apt:
    name: python3-docker
    state: present

