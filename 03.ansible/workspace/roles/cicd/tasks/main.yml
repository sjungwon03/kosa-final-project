---
# cicd: Gitea (git server) + Act_Runner (Gitea Actions)
# TODO: 폐쇄망 전환 전
#   1. 인터넷 머신에서 gitea, act_runner 바이너리 다운로드
#   2. roles/cicd/files/ 에 저장
#   3. get_url 태스크를 copy 태스크로 교체

# ── 1. Gitea 유저 및 디렉토리 ────────────────────────────────
- name: git 유저 생성
  user:
    name: "{{ gitea_user }}"
    home: "{{ gitea_home }}"
    shell: /bin/bash
    system: true

- name: Gitea 디렉토리 생성
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ gitea_user }}"
    group: "{{ gitea_user }}"
    mode: '0750'
  loop:
    - "{{ gitea_work_dir }}"
    - "{{ gitea_work_dir }}/custom"
    - "{{ gitea_work_dir }}/data"
    - "{{ gitea_work_dir }}/log"
    - "{{ gitea_custom_dir }}"

# ── 2. Gitea 바이너리 ────────────────────────────────────────
- name: Gitea 바이너리 다운로드
  get_url:
    url: "{{ gitea_binary_url }}"
    dest: /usr/local/bin/gitea
    mode: '0755'
  notify: restart gitea

# ── 3. Gitea systemd 서비스 ──────────────────────────────────
- name: Gitea systemd 유닛 배포
  copy:
    dest: /etc/systemd/system/gitea.service
    content: |
      [Unit]
      Description=Gitea (Git with a cup of tea)
      After=network.target

      [Service]
      User={{ gitea_user }}
      Group={{ gitea_user }}
      WorkingDirectory={{ gitea_work_dir }}
      Environment=GITEA_WORK_DIR={{ gitea_work_dir }}
      Environment=GITEA_CUSTOM={{ gitea_custom_dir }}
      ExecStart=/usr/local/bin/gitea web --port {{ gitea_port }}
      Restart=always
      RestartSec=5s

      [Install]
      WantedBy=multi-user.target
    mode: '0644'
  notify: restart gitea

- name: Gitea 활성화 및 시작
  systemd:
    name: gitea
    enabled: true
    state: started
    daemon_reload: true

# ── 4. Act_Runner 설치 ───────────────────────────────────────
- name: Docker 설치 (Act_Runner 실행 환경)
  apt:
    name:
      - docker.io
      - docker-compose
    state: present
    update_cache: false

- name: git 유저를 docker 그룹에 추가
  user:
    name: "{{ gitea_user }}"
    groups: docker
    append: true

- name: Act_Runner 바이너리 다운로드
  get_url:
    url: "{{ act_runner_binary_url }}"
    dest: /usr/local/bin/act_runner
    mode: '0755'
  notify: restart act_runner

- name: Act_Runner 설정 디렉토리 생성
  file:
    path: /etc/act_runner
    state: directory
    mode: '0750'

# act_runner register는 최초 1회 수동 실행 필요 (Gitea 서버 토큰 필요)
# 실행 방법: act_runner register --no-interactive \
#   --instance http://172.16.30.55:3000 \
#   --token <RUNNER_TOKEN> \
#   --name {{ act_runner_name }}
- name: Act_Runner 설정 파일 존재 여부 확인 (등록 여부 확인용)
  stat:
    path: /etc/act_runner/.runner
  register: act_runner_registered

- name: Act_Runner 미등록 안내
  debug:
    msg: >
      Act_Runner 미등록 상태입니다.
      Gitea 웹에서 Runner 토큰 발급 후 수동으로 등록하세요:
      act_runner register --no-interactive
        --instance http://{{ gitea_domain }}:{{ gitea_port }}
        --token <RUNNER_TOKEN>
        --name {{ act_runner_name }}
  when: not act_runner_registered.stat.exists

- name: Act_Runner systemd 유닛 배포
  copy:
    dest: /etc/systemd/system/act_runner.service
    content: |
      [Unit]
      Description=Gitea Act Runner
      After=network.target gitea.service

      [Service]
      User={{ gitea_user }}
      Group={{ gitea_user }}
      WorkingDirectory=/etc/act_runner
      ExecStart=/usr/local/bin/act_runner daemon
      Restart=on-failure
      RestartSec=5s

      [Install]
      WantedBy=multi-user.target
    mode: '0644'
  notify: restart act_runner

- name: Act_Runner 활성화 (등록 완료 시에만 시작)
  systemd:
    name: act_runner
    enabled: true
    state: "{{ 'started' if act_runner_registered.stat.exists else 'stopped' }}"
    daemon_reload: true
