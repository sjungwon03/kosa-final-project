---
# monitor: PLG 스택 (Prometheus + Loki + Grafana) + Keepalived VIP

# ── Keepalived (VIP: 172.16.30.90) ───────────────────────────
# TODO(폐쇄망): Nexus apt 프록시 저장소로 전환
- name: Keepalived 설치
  apt:
    name: keepalived
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: 커널 비로컬 바인딩 허용 (VIP 바인딩용)
  sysctl:
    name: net.ipv4.ip_nonlocal_bind
    value: '1'
    state: present
    reload: true

- name: Keepalived 설정 배포
  template:
    src: keepalived.conf.j2
    dest: /etc/keepalived/keepalived.conf
    mode: '0644'
  notify: restart keepalived

- name: Keepalived 활성화 및 시작
  systemd:
    name: keepalived
    enabled: true
    state: started

# ── 데이터 디렉토리 ───────────────────────────────────────────
- name: 모니터링 데이터 디렉토리 생성
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /opt/monitoring
    - /opt/monitoring/prometheus
    - /opt/monitoring/grafana
    - /opt/monitoring/loki

# ── 설정 파일 배포 ────────────────────────────────────────────
- name: Docker Compose 파일 배포
  template:
    src: docker-compose.yml.j2
    dest: /opt/monitoring/docker-compose.yml

- name: Prometheus 설정 파일 배포
  template:
    src: prometheus.yml.j2
    dest: /opt/monitoring/prometheus/prometheus.yml

# ── 스택 실행 ─────────────────────────────────────────────────
# TODO(폐쇄망): docker-compose.yml의 이미지 태그를 Nexus docker 프록시 저장소 URL로 전환
- name: 모니터링 스택 실행 (Docker Compose)
  shell: docker compose up -d
  args:
    chdir: /opt/monitoring
  changed_when: true
