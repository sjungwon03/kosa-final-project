---
# DNS 서버 Keepalived MASTER/BACKUP 설정은 hosts 파일에서 지정

# 등록할 DNS 레코드 목록
dns_records:
  # K8s 클러스터
  - { name: "k8s-vip",        ip: "172.16.30.30" }   # K8s 내부 VIP (Keepalived)
  - { name: "k8s-master-01",  ip: "172.16.30.31" }
  - { name: "k8s-master-02",  ip: "172.16.30.32" }
  - { name: "k8s-master-03",  ip: "172.16.30.33" }
  # 외부 진입점
  - { name: "haproxy-vip",    ip: "172.16.20.25" }   # HAProxy VIP (외부 → K8s API)
  # 서비스
  - { name: "registry",       ip: "172.16.30.50" }
  - { name: "monitoring",     ip: "172.16.30.80" }
  - { name: "siem",           ip: "172.16.30.70" }
  - { name: "vault",          ip: "172.16.30.20" }
  - { name: "cicd",           ip: "172.16.30.55" }
