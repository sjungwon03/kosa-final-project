[defaults]
# 1. 인벤토리 자동 맵핑
# 명령어에서 '-i inventory.ini' 옵션 생략
# TODO: 기본값이 prod — test 환경 실행 시 반드시 -i inventories/test/hosts 명시
inventory = inventories/prod/hosts
roles_path = roles
private_key_file = ~/.ssh/ansible
remote_user = kosa

# 2. SSH 최초 보안 인증(yes/no) 무시
host_key_checking = False

# 3. 파이썬 경고(WARNING) 무음 처리
interpreter_python = auto_silent

# 4. 터미널 출력 수정
stdout_callback = yaml

# 5. 동시 접속(Threading) 성능 튜닝
# 기본적으로 앤서블은 5대 단위로 서버에 진입 (현재 서버 설정을 기준으로 동시 접속 수치 수정)
forks = 20

# 6. 플레이북 실행 로그 파일 저장
# 경로: ~/workspace/ansible/ansible.log
# 실행자 추적: ANSIBLE_LOG_PATH 환경변수로 사용자별 파일 분리 가능
log_path = ~/workspace/ansible/ansible.log

# 7. 콜백 플러그인 — 태스크별 실행 시간 기록
# profile_tasks: 각 태스크 소요 시간 출력 (느린 태스크 탐지)
callbacks_enabled = profile_tasks

[privilege_escalation]
# 8. Sudo(Root) 권한 상승 자동화
become = True
become_method = sudo
become_user = root

[ssh_connection]
# 9. SSH 파이프라이닝 — 태스크당 SSH 연결 횟수 감소 (3회 → 1회)
pipelining = True
# 10. SSH 멀티플렉싱 — 동일 호스트 재접속 시 기존 소켓 재사용 (핸드쉐이크 생략)
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=10
