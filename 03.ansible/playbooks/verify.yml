---
- name: Verify Percona cluster status
  hosts: percona
  become: yes
  tasks:
    - name: Check wsrep cluster size
      command: mysql -e "SHOW STATUS LIKE 'wsrep_cluster_size'"
      register: cluster_size
      changed_when: false

    - name: Check wsrep cluster status
      command: mysql -e "SHOW STATUS LIKE 'wsrep_cluster_status'"
      register: cluster_status
      changed_when: false

    - name: Check wsrep local state
      command: mysql -e "SHOW STATUS LIKE 'wsrep_local_state_comment'"
      register: local_state
      changed_when: false

    - name: Display cluster info
      debug:
        msg:
          - "Cluster Size: {{ cluster_size.stdout }}"
          - "Cluster Status: {{ cluster_status.stdout }}"
          - "Local State: {{ local_state.stdout }}"

- name: Verify HAProxy status
  hosts: haproxy
  become: yes
  tasks:
    - name: Check HAProxy status
      uri:
        url: "http://localhost:{{ haproxy_stats_port }}/stats"
        user: "{{ haproxy_stats_user }}"
        password: "{{ haproxy_stats_password }}"
        return_content: yes
      register: haproxy_status
      changed_when: false

    - name: Display HAProxy info
      debug:
        msg: "HAProxy stats available at http://{{ ansible_host }}:{{ haproxy_stats_port }}/stats"

- name: Verify ProxySQL status
  hosts: proxysql
  become: yes
  tasks:
    - name: Check ProxySQL MySQL connections
      command: mysql -h127.0.0.1 -P6032 -uadmin -padmin -e "SELECT * FROM mysql_servers"
      register: proxysql_servers
      changed_when: false

    - name: Display ProxySQL info
      debug:
        msg: "ProxySQL admin interface available at {{ ansible_host }}:6032"