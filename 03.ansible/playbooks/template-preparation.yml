---
- name: Prepare Ubuntu VM as Proxmox Template
  hosts: template_vm
  become: yes
  gather_facts: yes
  
  vars:
    template_user: ubuntu
    template_hostname: ubuntu-template
  
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Upgrade all packages
      apt:
        upgrade: dist
        autoremove: yes

    - name: Install essential packages for template
      apt:
        name:
          - qemu-guest-agent
          - cloud-init
          - netplan.io
          - openssh-server
          - vim
          - wget
          - curl
          - jq
          - ca-certificates
          - gnupg
          - apt-transport-https
          - software-properties-common
          - python3
          - python3-pip
        state: present

    - name: Enable and start Qemu Guest Agent
      systemd:
        name: qemu-guest-agent
        enabled: yes
        state: started

    - name: Configure SSH for template
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        state: present
      loop:
        - { regexp: '^#?PermitRootLogin', line: 'PermitRootLogin yes' }
        - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication yes' }
        - { regexp: '^#?PubkeyAuthentication', line: 'PubkeyAuthentication yes' }

    - name: Restart SSH service
      systemd:
        name: sshd
        state: restarted

    - name: Disable swap
      command: swapoff -a
      when: ansible_swaptotal_mb > 0
      changed_when: ansible_swaptotal_mb > 0

    - name: Remove swap entries from fstab
      mount:
        name: swap
        fstype: swap
        state: absent

    - name: Clean apt cache and lists
      apt:
        autoclean: yes
        autoremove: yes

    - name: Remove cached deb files
      shell: rm -rf /var/cache/apt/archives/*.deb
      changed_when: false

    - name: Clean journal logs
      command: journalctl --vacuum-time=1s
      changed_when: false

    - name: Remove old logs
      shell: rm -rf /var/log/*.log /var/log/*.gz /var/log/journal/*
      changed_when: false

    - name: Reset machine-id for Cloud-init
      shell: |
        rm -f /etc/machine-id
        touch /etc/machine-id
        chmod 0644 /etc/machine-id
      changed_when: false

    - name: Set template hostname
      hostname:
        name: "{{ template_hostname }}"

    - name: Update hosts file for template
      lineinfile:
        path: /etc/hosts
        regexp: '^127\.0\.1\.1'
        line: '127.0.1.1 localhost'
        state: present

    - name: Remove SSH host keys (will be regenerated on clone)
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/ssh/ssh_host_rsa_key
        - /etc/ssh/ssh_host_rsa_key.pub
        - /etc/ssh/ssh_host_ecdsa_key
        - /etc/ssh/ssh_host_ecdsa_key.pub
        - /etc/ssh/ssh_host_ed25519_key
        - /etc/ssh/ssh_host_ed25519_key.pub

    - name: Clean Cloud-init data
      command: cloud-init clean
      changed_when: false

    - name: Remove Cloud-init instance data
      file:
        path: /var/lib/cloud
        state: absent

    - name: Remove Cloud-init seed
      file:
        path: /var/lib/cloud/seed
        state: absent

    - name: Remove bash history
      shell: |
        rm -f ~/.bash_history
        rm -f /home/{{ template_user }}/.bash_history
      changed_when: false

    - name: Set timezone to UTC
      timezone:
        name: UTC

    - name: Stop Qemu Guest Agent before shutdown
      systemd:
        name: qemu-guest-agent
        state: stopped

    - name: Shutdown VM for template conversion
      command: shutdown -h now
      async: 1
      poll: 0
      ignore_errors: yes

    - name: Display template conversion instructions
      debug:
        msg:
          - "VM has been prepared and is shutting down."
          - "After VM stops, convert to template:"
          - "  CLI: qm template <VMID>"
          - "  GUI: VM → More → Convert to template"
          - "Template is ready for Terraform use!"