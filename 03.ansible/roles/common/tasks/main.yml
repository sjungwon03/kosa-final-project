---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install required packages
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - software-properties-common
      - wget
      - jq
      - net-tools
      - vim
    state: present

- name: Disable swap
  command: swapoff -a
  when: ansible_swaptotal_mb > 0

- name: Remove swap from fstab
  mount:
    name: swap
    fstype: swap
    state: absent

- name: Set timezone
  timezone:
    name: UTC

- name: Configure hosts file
  lineinfile:
    path: /etc/hosts
    regexp: "^{{ item.value.ansible_host }}"
    line: "{{ item.value.ansible_host }} {{ item.key }}"
  loop: "{{ hostvars | dict2items | selectattr('value.ansible_host', 'defined') | list }}"
  when: item.value.ansible_host is defined