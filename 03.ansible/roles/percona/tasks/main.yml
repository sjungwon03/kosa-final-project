---
- name: Install gnupg2 and lsb-release
  apt:
    name:
      - gnupg2
      - lsb-release
    state: present

- name: Install Percona release package
  apt:
    deb: https://repo.percona.com/apt/percona-release_latest.generic_all.deb
    state: present

- name: Enable Percona XtraDB Cluster repository
  command: percona-release enable-only pxc-80 release --scheme https

- name: Update apt cache
  apt:
    update_cache: yes

- name: Install Percona XtraDB Cluster
  apt:
    name:
      - percona-xtradb-cluster
      - percona-xtradb-cluster-client
    state: present

- name: Install additional tools
  apt:
    name:
      - percona-toolkit
      - qpress
    state: present

- name: Create MySQL data directory
  file:
    path: "{{ mysql_data_dir }}"
    state: directory
    owner: mysql
    group: mysql
    mode: '0755'

- name: Create MySQL log directory
  file:
    path: "{{ mysql_log_dir }}"
    state: directory
    owner: mysql
    group: mysql
    mode: '0755'

- name: Configure my.cnf
  template:
    src: my.cnf.j2
    dest: /etc/mysql/my.cnf
    owner: root
    group: root
    mode: '0644'
  notify: Restart MySQL

- name: Stop MySQL if running
  systemd:
    name: mysql
    state: stopped
  when: not pxc_bootstrap

- name: Bootstrap first PXC node
  block:
    - name: Bootstrap cluster
      command: /etc/init.d/mysql bootstrap-pxc
      args:
        creates: "{{ mysql_data_dir }}/grastate.dat"

    - name: Wait for MySQL to start
      wait_for:
        port: "{{ pxc_port }}"
        timeout: 60

    - name: Create SST user
      mysql_user:
        name: "{{ pxc_sst_user }}"
        password: "{{ pxc_sst_password }}"
        priv: "*.*:RELOAD,LOCK TABLES,PROCESS,REPLICATION SLAVE"
        state: present
      no_log: true

    - name: Create root user with full access
      mysql_user:
        name: root
        password: "{{ pxc_root_password }}"
        priv: "*.*:ALL,GRANT"
        host_all: yes
        state: present
      no_log: true

  when: pxc_bootstrap

- name: Join existing PXC cluster
  block:
    - name: Start MySQL to join cluster
      systemd:
        name: mysql
        state: started
        enabled: yes

    - name: Wait for MySQL to start
      wait_for:
        port: "{{ pxc_port }}"
        timeout: 120

    - name: Wait for cluster sync
      command: mysql -e "SHOW STATUS LIKE 'wsrep_local_state_comment'"
      register: sync_status
      until: sync_status.stdout.find('Synced') != -1
      retries: 30
      delay: 10

  when: not pxc_bootstrap

- name: Enable MySQL service
  systemd:
    name: mysql
    enabled: yes