{{- if and .Values.welfareService.enabled .Values.welfareService.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: welfare_service-hpa
  namespace: {{ .Values.global.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: welfare_service
  minReplicas: {{ .Values.welfareService.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.welfareService.autoscaling.maxReplicas }}
  metrics:
  {{- if .Values.welfareService.autoscaling.targetCPUUtilizationPercentage }}
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.welfareService.autoscaling.targetCPUUtilizationPercentage }}
  {{- end }}
{{- end }}