apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: kosa
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: harbor.kosa.local/kosa/api-gateway:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: EMPLOYEE_SERVICE_URL
          value: "http://employee_service:8001"
        - name: WELFARE_SERVICE_URL
          value: "http://welfare_service:8002"
        - name: MYSQL_HOST
          value: "10.0.3.10"
        - name: MYSQL_PORT
          value: "3306"
        - name: MYSQL_USER
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: username
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: password
        - name: MYSQL_DATABASE
          value: "kosa"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
      imagePullSecrets:
      - name: harbor-registry-secret
---
apiVersion: v1
kind: Secret
metadata:
  name: harbor-registry-secret
  namespace: kosa
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "harbor.kosa.local": {
          "username": "admin",
          "password": "HarborAdmin123",
          "auth": "YWRtaW46SGFyYm9yQWRtaW4xMjM="
        }
      }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: kosa
spec:
  type: LoadBalancer
  ports:
  - port: 8000
    targetPort: 8000
  selector:
    app: api-gateway