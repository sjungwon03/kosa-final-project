apiVersion: v1
kind: Namespace
metadata:
  name: harbor
---
apiVersion: v1
kind: Secret
metadata:
  name: harbor-secret
  namespace: harbor
type: Opaque
stringData:
  harbor-admin-password: "HarborAdmin123"
  database-password: "HarborDB123"
  core-secret: "HarborCoreSecret123"
  jobservice-secret: "HarborJobServiceSecret123"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: harbor-core
  namespace: harbor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: harbor-core
  template:
    metadata:
      labels:
        app: harbor-core
    spec:
      containers:
      - name: harbor-core
        image: goharbor/harbor-core:v2.8.0
        ports:
        - containerPort: 8080
        env:
        - name: HARBOR_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: harbor-secret
              key: harbor-admin-password
        - name: CORE_SECRET
          valueFrom:
            secretKeyRef:
              name: harbor-secret
              key: core-secret
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: harbor-secret
              key: database-password
        - name: EXT_ENDPOINT
          value: "http://harbor.kosa.local"
        - name: REGISTRY_URL
          value: "http://harbor-registry:5000"
        - name: PORTAL_URL
          value: "http://harbor-portal:8080"
        - name: JOBSERVICE_URL
          value: "http://harbor-jobservice:8080"
        volumeMounts:
        - name: harbor-config
          mountPath: /etc/harbor
      volumes:
      - name: harbor-config
        configMap:
          name: harbor-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: harbor-registry
  namespace: harbor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: harbor-registry
  template:
    metadata:
      labels:
        app: harbor-registry
    spec:
      containers:
      - name: registry
        image: goharbor/registry-photon:v2.8.0
        ports:
        - containerPort: 5000
        volumeMounts:
        - name: registry-data
          mountPath: /storage
      volumes:
      - name: registry-data
        persistentVolumeClaim:
          claimName: harbor-registry-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: harbor-portal
  namespace: harbor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: harbor-portal
  template:
    metadata:
      labels:
        app: harbor-portal
    spec:
      containers:
      - name: harbor-portal
        image: goharbor/harbor-portal:v2.8.0
        ports:
        - containerPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: harbor-jobservice
  namespace: harbor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: harbor-jobservice
  template:
    metadata:
      labels:
        app: harbor-jobservice
    spec:
      containers:
      - name: jobservice
        image: goharbor/harbor-jobservice:v2.8.0
        ports:
        - containerPort: 8080
        env:
        - name: JOBSERVICE_SECRET
          valueFrom:
            secretKeyRef:
              name: harbor-secret
              key: jobservice-secret
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: harbor-db
  namespace: harbor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: harbor-db
  template:
    metadata:
      labels:
        app: harbor-db
    spec:
      containers:
      - name: postgres
        image: goharbor/harbor-db:v2.8.0
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: harbor-secret
              key: database-password
        volumeMounts:
        - name: db-data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: db-data
        persistentVolumeClaim:
          claimName: harbor-db-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: harbor-registry-pvc
  namespace: harbor
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: harbor-db-pvc
  namespace: harbor
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: harbor-config
  namespace: harbor
data:
  harbor.yml: |
    hostname: harbor.kosa.local
    http_port: 80
    harbor_admin_password: HarborAdmin123
    database:
      password: HarborDB123
    data_volume: /storage
---
apiVersion: v1
kind: Service
metadata:
  name: harbor
  namespace: harbor
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8080
    name: http
  - port: 443
    targetPort: 443
    name: https
  selector:
    app: harbor-core
---
apiVersion: v1
kind: Service
metadata:
  name: harbor-registry
  namespace: harbor
spec:
  ports:
  - port: 5000
    targetPort: 5000
  selector:
    app: harbor-registry
---
apiVersion: v1
kind: Service
metadata:
  name: harbor-portal
  namespace: harbor
spec:
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: harbor-portal
---
apiVersion: v1
kind: Service
metadata:
  name: harbor-jobservice
  namespace: harbor
spec:
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: harbor-jobservice
---
apiVersion: v1
kind: Service
metadata:
  name: harbor-db
  namespace: harbor
spec:
  ports:
  - port: 5432
    targetPort: 5432
  selector:
    app: harbor-db